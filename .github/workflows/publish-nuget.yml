name: Publish NuGet

on:
  push:
    tags:
      - 'KoreForge.Time/v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Pack & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build KoreForge.Time.sln -c Release

      - name: Test
        run: dotnet test KoreForge.Time.sln -c Release --no-build

      - name: Pack
        run: dotnet pack src/KF.Time/KF.Time.csproj -c Release --no-build -o artifacts/

      - name: NuGet login (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.nupkg
          generate_release_notes: true
